<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My first webpage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>

    <style type="text/css">
        header{
        background-color: cadetblue;
        color: white;
        text-align: center;
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        margin-bottom: 20px;
        }
        p{
        background-color: cadetblue;
        color: white;
        text-align: center;
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        margin-bottom: 20px;
        }
        img {
        display: block;
        margin: 0 auto;
        border: 5px solid black;
        }
        form{
        background-color: cadetblue;
        color: white;
        text-align: center;
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        margin-bottom: 20px;
        }
        body{
            background-color: white;
        }
        .caption {
        position: absolute;
        bottom: 0;
        right: 0;
        color: white;
        padding: 5px;
        }
        .caption:hover:after {
        content: "deez nuts";
        position: absolute;
        bottom: 20px;
        right: 0;
        background-color: black;
        color: white;
        padding: 5px;
        visibility: visible;
        }
        .grid-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        }
        .grid-item {
        background-color: cadetblue;
        color: white;
        text-align: center;
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
    
        </style>
</head>
<body>
    <header><h1>Welcome to My First Webpage</h1></header>
    <div class="grid-container">
        <div class="grid-item">
            <figure class="figure m-2">
                <img src="paint-naama.jpg" class="figure-img img-fluid rounded" alt="An image" width="300">
                <figcaption class="figure-caption text-end" style="font-size: small;">Joonas Korpinen. "KING". Paint, 27.1.2023</figcaption>
            </figure>
        </div>
        <div class="grid-item">
            <p>Some good <a href="https://www.youtube.com/watch?v=662JyNLVpxE">music.</a></p>
            <form>
                <label for="colorPicker">Select a background color:</label>
                <input type="color" id="colorPicker" onchange="changeColor()">
                <button type="button" onclick="changeColor()">Change Color</button>
            </form>
            <div class="caption">Hover your mouse over here</div>
        </div>
    </div>
    <script>
        function changeColor() {
    var colorPicker = document.getElementById("colorPicker");
    var selectedColor = colorPicker.value;
    document.body.style.backgroundColor = selectedColor;
    }
    </script>
</body>

</html>
